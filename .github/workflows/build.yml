name: Build Windows Installer

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir pyyaml keyring prompt_toolkit pywin32
          pip install --no-cache-dir pygments paramiko deepdiff
          pip install --no-cache-dir qdarktheme
          pip install --no-cache-dir nuitka pyside6 --timeout=600

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Build with Nuitka
        run: |
          nuitka --windows-console-mode=disable --windows-icon-from-ico=icons/logo.ico `
            --follow-imports `
            --remove-output `
            --jobs=4 `
            --python-flag=no_site `
            --lto=yes `
            --output-dir=deploy `
            --standalone `
            --enable-plugin=pyside6 `
            --include-module=qdarktheme `
            --include-module=deepdiff `
            --include-module=pygments `
            --include-module=paramiko `
            --include-module=yaml `
            --include-module=openai `
            --include-module=keyring `
            --include-module=prompt_toolkit `
            --include-package=unicrypto `
            --include-module=pygments.formatters.html `
            --include-module=pygments.lexers.shell `
            --include-package=qtermwidget,core,function,style,ui,icons `
            --include-data-dir=conf=conf `
            --company-name=HanXuan `
            --product-name=cubeShell `
            --file-version=2.7.0.0 `
            --product-version=2.7.0 `
            --file-description="A powerful shell application" `
            cube-shell.py

      - name: Create tunnel.json
        run: |
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\conf -Force
          "{}" | Out-File deploy\cube-shell.dist\conf\tunnel.json

      - name: Clean config.dat
        run: Remove-Item -Force deploy\cube-shell.dist\conf\config.dat -ErrorAction SilentlyContinue

      - name: Copy qtermwidget files
        run: |
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\color-schemes -Force
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\kb-layouts -Force
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\translations -Force
          Copy-Item qtermwidget\color-schemes\* deploy\cube-shell.dist\qtermwidget\color-schemes\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\kb-layouts\* deploy\cube-shell.dist\qtermwidget\kb-layouts\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\translations\* deploy\cube-shell.dist\qtermwidget\translations\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\default.keytab deploy\cube-shell.dist\qtermwidget\

      - name: Build installer with Inno Setup
        run: iscc installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubeShell-installer
          path: Output/*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}