name: Build Windows Installer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nuitka
        run: pip install --no-cache-dir nuitka

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build with Nuitka
        run: |
          nuitka --windows-console-mode=disable --windows-icon-from-ico=icons/logo.ico --follow-imports --remove-output --jobs=4 --python-flag=no_site --output-dir=deploy --standalone --enable-plugin=pyside6 --include-data-dir=conf=conf --company-name=HanXuan --product-name=cubeShell --file-version=2.7.0.0 --product-version=2.7.0 --file-description="cubeShell" cube-shell.py

      - name: Check output
        run: |
          if (Test-Path deploy\cube-shell.dist) {
            Write-Host "Nuitka output found"
            Get-ChildItem deploy\cube-shell.dist -Recurse | Measure-Object -Property Length -Sum | ForEach-Object { Write-Host "Total: $([math]::Round($_.Sum/1MB,1)) MB" }
          } else {
            Write-Host "ERROR: deploy cube-shell.dist not found"
            Get-ChildItem deploy -ErrorAction SilentlyContinue
          }

      - name: Create directories
        run: |
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\conf -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\color-schemes -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\kb-layouts -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path deploy\cube-shell.dist\qtermwidget\translations -Force -ErrorAction SilentlyContinue

      - name: Create tunnel.json
        run: $null | Out-File deploy\cube-shell.dist\conf\tunnel.json

      - name: Copy qtermwidget
        run: |
          Copy-Item qtermwidget\color-schemes\* deploy\cube-shell.dist\qtermwidget\color-schemes\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\kb-layouts\* deploy\cube-shell.dist\qtermwidget\kb-layouts\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\translations\* deploy\cube-shell.dist\qtermwidget\translations\ -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item qtermwidget\default.keytab deploy\cube-shell.dist\qtermwidget\ -ErrorAction SilentlyContinue

      - name: Build installer
        run: iscc installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubeShell-installer
          path: Output/
          retention-days: 30